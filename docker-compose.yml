services:
  bytebank-home:
    build:
      context: .
      dockerfile: apps/bytebank-home/Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Client-side: browser acessa backend via porta mapeada no host
      NEXT_PUBLIC_API_URL: http://localhost:3002
      # Server-side (rewrites): dentro da rede Docker, bytebank-app é resolvível
      NEXT_PUBLIC_APP_URL: http://bytebank-app:3001
    depends_on:
      - backend
    networks:
      - bytebank-network

  bytebank-app:
    build:
      context: .
      dockerfile: apps/bytebank-app/Dockerfile
      target: development
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      - backend
      - bytebank-home
    networks:
      - bytebank-network

  backend:
    build:
      context: ./backend/tech-challenge-2
      dockerfile: DockerFile
    ports:
      - "3002:3000"
    networks:
      - bytebank-network

networks:
  bytebank-network:
    driver: bridge
