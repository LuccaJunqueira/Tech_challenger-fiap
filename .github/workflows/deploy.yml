name: Deploy ByteBank Microfrontends to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # v3 está deprecated, v4 é a atual estável

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (root)
        run: npm install

      - name: Run lint for bytebank-home
        run: npm run lint --workspace=bytebank-home

      - name: Build bytebank-home (production)
        run: npm run build --workspace=bytebank-home

  deploy-home:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy bytebank-home to Vercel
        uses: amondnet/vercel-action@v25.2.0     # action ativa e mantida, travada em versão fixa
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_HOME_PROJECT_ID }}
          working-directory: ./apps/bytebank-home   # equivalente ao "cwd" da action antiga
          vercel-args: '--prod'
          vercel-version: latest                      # sem isso, ela faz deploy de PREVIEW, não produção