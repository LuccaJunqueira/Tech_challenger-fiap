name: Deploy ByteBank Microfrontends to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies (root)
        run: npm install

      - name: Run lint for bytebank-home
        run: npm run lint --workspace=bytebank-home

      - name: Run lint for bytebank-app
        run: npm run lint --workspace=bytebank-app

      - name: Build bytebank-home (production)
        run: npm run build --workspace=bytebank-home

      - name: Build bytebank-app (production)
        run: npm run build --workspace=bytebank-app

  deploy-home:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy bytebank-home to Vercel
        uses: supercharge/vercel-action@v2.0.0
        with:
          cwd: ./apps/bytebank-home
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_HOME_PROJECT_ID }}

  deploy-app:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy bytebank-app to Vercel
        uses: supercharge/vercel-action@v2.0.0
        with:
          cwd: ./apps/bytebank-app
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_APP_PROJECT_ID }}
